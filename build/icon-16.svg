<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="hex16" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2056a0"/>
      <stop offset="100%" stop-color="#0d2850"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg16)"/>

  <!-- Hexagon — nearly full bleed so it's visible at 16px -->
  <polygon points="128,20 224,73 224,183 128,236 32,183 32,73"
    fill="url(#hex16)" stroke="#4a9eff" stroke-width="10"/>

  <!-- Play triangle — large and offset right for visual balance -->
  <polygon points="100,84 100,172 188,128" fill="#e8f4ff"/>
</svg>
