name: Build and Release Desktop

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-info:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.get-sha.outputs.sha }}
    steps:
      - name: Get short SHA
        id: get-sha
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs: release-info
    env:
      HAS_WIN_CERT: ${{ secrets.WIN_CERT_BASE64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install PyInstaller --quiet

      - name: Set up ffmpeg (Windows)
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg-win64.zip -MaximumRetryCount 3
          Expand-Archive -Path ffmpeg-win64.zip -DestinationPath "build\" -Force
          $extracted = Get-ChildItem "build\" -Directory | Where-Object { $_.Name -like "ffmpeg-master-*" } | Select-Object -First 1
          $ffmpegExe = Join-Path $extracted.FullName "bin\ffmpeg.exe"
          echo "FFMPEG_BIN=$((Resolve-Path $ffmpegExe).Path)" >> $env:GITHUB_ENV
          Write-Host "[ffmpeg] Path: $env:FFMPEG_BIN"

      - name: Build Windows .exe
        run: pyinstaller pyinstaller-windows.spec
        env:
          FFMPEG_BIN: ${{ env.FFMPEG_BIN }}

      - name: List build output
        run: Get-ChildItem -Recurse dist | Select-Object FullName, Length

      - name: Sign Windows .exe (Authenticode)
        if: env.HAS_WIN_CERT == 'true'
        env:
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          WIN_SIGN_TIMESTAMP_URL: ${{ vars.WIN_SIGN_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
        run: |
          # Decode cert to temp file
          $certBytes = [Convert]::FromBase64String($env:WIN_CERT_BASE64)
          $certPath  = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          # Find signtool.exe dynamically (SDK version varies on windows-latest)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName |
            Select-Object -Last 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found in Windows Kits" }
          Write-Host "Using signtool: $signtool"

          $exePath = "dist\L4-Proxy-Test-Server\L4-Proxy-Test-Server.exe"
          & $signtool sign `
            /fd SHA256 `
            /tr $env:WIN_SIGN_TIMESTAMP_URL `
            /td SHA256 `
            /f $certPath `
            /p $env:WIN_CERT_PASSWORD `
            $exePath
          if ($LASTEXITCODE -ne 0) { throw "signtool sign failed (exit $LASTEXITCODE)" }

          Remove-Item $certPath -Force
          Write-Host "Signed: $exePath"

      - name: Compute checksums
        run: |
          $exePath = "dist\L4-Proxy-Test-Server\L4-Proxy-Test-Server.exe"
          if (Test-Path $exePath) {
            Copy-Item -Path $exePath -Destination "L4-Proxy-Test-Server.exe" -Force
            $hash = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash
            "$hash  L4-Proxy-Test-Server.exe" | Out-File -FilePath "L4-Proxy-Test-Server.exe.sha256"
            Write-Host "SHA256: $hash"
          } else {
            Write-Error ".exe not found at $exePath"
            Get-ChildItem -Recurse dist
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            L4-Proxy-Test-Server.exe
            L4-Proxy-Test-Server.exe.sha256

  build-macos:
    runs-on: macos-latest
    needs: release-info
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install PyInstaller --quiet

      - name: Set up ffmpeg (macOS)
        run: |
          mkdir -p build/ffmpeg-macos
          curl -L --retry 3 -o build/ffmpeg-macos/ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          unzip -q -o build/ffmpeg-macos/ffmpeg.zip -d build/ffmpeg-macos/
          chmod +x build/ffmpeg-macos/ffmpeg
          echo "FFMPEG_BIN=$(pwd)/build/ffmpeg-macos/ffmpeg" >> "$GITHUB_ENV"
          echo "[ffmpeg] Path: $FFMPEG_BIN"

      - name: Build macOS .app
        run: pyinstaller pyinstaller-macos.spec
        env:
          FFMPEG_BIN: ${{ env.FFMPEG_BIN }}

      - name: List build output
        run: find dist -type f | head -30

      - name: Sign and notarize macOS .app
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="dist/L4 Proxy Test Server.app"

          # 1. Import certificate into a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # 2. Code-sign the app (deep, hardened runtime required for notarization)
          codesign --deep --force --verify --verbose \
            --timestamp \
            --options runtime \
            --entitlements /dev/null \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

          # 3. Zip for notarization upload
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/notarize.zip"

          # 4. Notarize
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # 5. Staple
          xcrun stapler staple "$APP_PATH"

          # 6. Clean up keychain
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Create distribution zip
        run: |
          APP_PATH="dist/L4 Proxy Test Server.app"
          ZIP_PATH="L4-Proxy-Test-Server-macos.zip"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found: $APP_PATH"
            ls -la dist
            exit 1
          fi
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Compute checksums
        run: |
          shasum -a 256 "L4-Proxy-Test-Server-macos.zip" | tee "L4-Proxy-Test-Server-macos.zip.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            L4-Proxy-Test-Server-macos.zip
            L4-Proxy-Test-Server-macos.zip.sha256

  create-release:
    needs: [release-info, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force-update latest git tag
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag -f latest
          git push origin latest --force

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f -exec ls -lh {} \;

      - name: Create/Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build (${{ needs.release-info.outputs.sha }})
          allowUpdates: true
          removeArtifacts: true
          artifacts: |
            release-artifacts/windows-exe/L4-Proxy-Test-Server.exe
            release-artifacts/windows-exe/L4-Proxy-Test-Server.exe.sha256
            release-artifacts/macos-app/L4-Proxy-Test-Server-macos.zip
            release-artifacts/macos-app/L4-Proxy-Test-Server-macos.zip.sha256
          artifactErrorsFailBuild: false
          generateReleaseNotes: false
          prerelease: true
          body: |
            **Latest build** from `main` @ `${{ needs.release-info.outputs.sha }}`

            FFmpeg is **bundled** — no separate installation required.
            Windows builds are **Authenticode-signed** (if cert configured). macOS builds are unsigned (see README for Gatekeeper workaround).

            | Platform | File |
            |----------|------|
            | Windows  | `L4-Proxy-Test-Server.exe` |
            | macOS    | `L4-Proxy-Test-Server-macos.zip` |