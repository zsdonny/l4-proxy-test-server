name: Build and Release Desktop

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:  # Allow manual trigger for troubleshooting

permissions:
  contents: write

jobs:
  release-info:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get-version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs: release-info
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install PyInstaller --quiet

      - name: Build Windows .exe
        run: pyinstaller pyinstaller-windows.spec

      - name: List build output
        run: Get-ChildItem -Recurse dist | Select-Object FullName, Length

      - name: Compute checksums
        run: |
          $exePath = "dist\L4-Proxy-Test-Server\L4-Proxy-Test-Server.exe"
          if (Test-Path $exePath) {
            $hash = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash
            "$hash  L4-Proxy-Test-Server.exe" | Out-File -FilePath "L4-Proxy-Test-Server.exe.sha256"
            Write-Host "SHA256: $hash"
          } else {
            Write-Error ".exe not found at $exePath"
            Get-ChildItem -Recurse dist
            exit 1
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist/L4-Proxy-Test-Server/**
            L4-Proxy-Test-Server.exe.sha256

  build-macos:
    runs-on: macos-latest
    needs: release-info
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install PyInstaller --quiet

      - name: Build macOS .app
        run: pyinstaller pyinstaller-macos.spec

      - name: List build output
        run: find dist -type f | head -30

      - name: Create distribution zip
        run: |
          cd dist
          zip -r "L4-Proxy-Test-Server-macos.zip" "L4 Proxy Test Server.app"
          cd ..

      - name: Compute checksums
        run: |
          sha256sum "dist/L4-Proxy-Test-Server-macos.zip" | tee "L4-Proxy-Test-Server-macos.zip.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            dist/L4-Proxy-Test-Server-macos.zip
            L4-Proxy-Test-Server-macos.zip.sha256

  create-release:
    needs: [release-info, build-windows, build-macos]
    runs-on: ubuntu-latest
    # Only create release on tag push, not manual dispatch
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "release-artifacts/**/*"
          artifactErrorsFailBuild: false
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## Release ${{ needs.release-info.outputs.version }}
            
            ### Desktop Builds
            - **Windows**: `L4-Proxy-Test-Server.exe` — single-file executable (unsigned)
            - **macOS**: `L4-Proxy-Test-Server-macos.zip` — app bundle (unsigned)
            
            #### Verification
            ```bash
            # Windows (PowerShell)
            (Get-FileHash -Path "L4-Proxy-Test-Server.exe" -Algorithm SHA256).Hash
            
            # macOS/Linux
            sha256sum L4-Proxy-Test-Server-macos.zip
            ```

            ⚠️ **Unsigned Builds**: Desktop executables are unsigned. Your OS may show security warnings on first run.
