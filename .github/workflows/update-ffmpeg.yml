name: Update FFmpeg

on:
  schedule:
    - cron: "0 0 1 * *"  # first of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature/appbundling (with LFS)
        uses: actions/checkout@v5
        with:
          ref: feature/appbundling
          lfs: true

      - name: Download Windows ffmpeg (BtbN static GPL build)
        run: |
          curl -fsSL --retry 3 -o /tmp/ffmpeg-win64.zip \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          cd /tmp && unzip -q ffmpeg-win64.zip
          FFMPEG_EXE=$(find /tmp -maxdepth 3 -name "ffmpeg.exe" | head -1)
          if [ -z "$FFMPEG_EXE" ]; then echo "ffmpeg.exe not found in zip"; exit 1; fi
          mkdir -p $GITHUB_WORKSPACE/vendor/ffmpeg/windows
          cp "$FFMPEG_EXE" $GITHUB_WORKSPACE/vendor/ffmpeg/windows/ffmpeg.exe
          echo "Windows ffmpeg size: $(wc -c < $GITHUB_WORKSPACE/vendor/ffmpeg/windows/ffmpeg.exe) bytes"

      - name: Download macOS ffmpeg (evermeet.cx static GPL build)
        run: |
          mkdir -p $GITHUB_WORKSPACE/vendor/ffmpeg/macos
          curl -fsSL --retry 3 -o /tmp/ffmpeg-macos.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          cd /tmp && unzip -q ffmpeg-macos.zip
          if [ ! -f /tmp/ffmpeg ]; then echo "macOS ffmpeg binary not found in zip"; exit 1; fi
          cp /tmp/ffmpeg $GITHUB_WORKSPACE/vendor/ffmpeg/macos/ffmpeg
          chmod +x $GITHUB_WORKSPACE/vendor/ffmpeg/macos/ffmpeg
          echo "macOS ffmpeg size: $(wc -c < $GITHUB_WORKSPACE/vendor/ffmpeg/macos/ffmpeg) bytes"

      - name: Check for changes
        id: diff
        run: |
          cd $GITHUB_WORKSPACE
          git diff --stat vendor/ffmpeg/
          if git diff --quiet vendor/ffmpeg/ && git ls-files --error-unmatch vendor/ffmpeg/windows/ffmpeg.exe vendor/ffmpeg/macos/ffmpeg > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendor/ffmpeg/
          git commit -m "chore: update vendored FFmpeg binaries"
          git push origin feature/appbundling
